<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章列表 | Wells 單頁結論</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <style>
        /* 自定義樣式 */
        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            background-color: #0a0a2a;
            /* 深藍色背景 */
            color: #e0e0e0;
            overflow-x: hidden;
        }

        /* 玻璃擬態效果 */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border-color: rgba(199, 210, 254, 0.5);
            /* 懸停時邊框更亮 */
        }

        /* 漸層文字 */
        .gradient-text {
            background: linear-gradient(120deg, #89f7fe 0%, #66a6ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-fill-color: transparent;
        }

        .gradient-text-purple {
            background: linear-gradient(120deg, #d8b4fe 0%, #818cf8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-fill-color: transparent;
        }

        /* 進場動畫 (僅用於 header 和 search) */
        .fade-in-up {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.6s cubic-bezier(0.390, 0.575, 0.565, 1.000), transform 0.6s cubic-bezier(0.390, 0.575, 0.565, 1.000);
        }

        .fade-in-up.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* 漸層圓形圖示 */
        .gradient-icon-bg {
            background: linear-gradient(135deg, rgba(102, 166, 255, 0.2) 0%, rgba(137, 247, 254, 0.2) 100%);
        }
    </style>
</head>

<body class="min-h-screen flex flex-col">
    <!-- 背景漸層模糊圓點 -->
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10">
        <div
            class="absolute top-[-20%] left-[-10%] w-96 h-96 bg-purple-600/30 rounded-full filter blur-3xl opacity-50 animate-blob">
        </div>
        <div
            class="absolute top-[10%] right-[-10%] w-96 h-96 bg-cyan-400/30 rounded-full filter blur-3xl opacity-50 animate-blob animation-delay-2000">
        </div>
        <div
            class="absolute bottom-[-20%] left-[20%] w-96 h-96 bg-blue-500/30 rounded-full filter blur-3xl opacity-50 animate-blob animation-delay-4000">
        </div>
    </div>

    <div class="container mx-auto px-4 sm:px-6 lg:px-8 py-16 sm:py-24 flex-grow">
        <!-- 標題區塊 -->
        <header class="text-center mb-12 fade-in-up">
            <h1 class="text-5xl md:text-7xl font-black tracking-tight gradient-text mb-4">Wells 單頁結論</h1>
            <p class="text-lg md:text-xl text-slate-400 max-w-2xl mx-auto">專注於技術探索、架構設計與系統開發的深度實踐</p>
        </header>

        <!-- 搜尋框 -->
        <div class="max-w-2xl mx-auto mb-12 fade-in-up" style="transition-delay: 100ms;">
            <input type="text" id="search-input" placeholder="搜尋文章標題或描述..."
                class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-cyan-500 transition-all duration-300">
        </div>

        <!-- 文章列表 -->
        <main id="post-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- 文章卡片將由 JavaScript 動態插入 -->
        </main>
    </div>

    <!-- 頁腳 -->
    <footer class="w-full py-6 mt-16 bg-black/20 backdrop-blur-sm border-t border-white/10">
        <div class="container mx-auto text-center">
            <a href="https://wellstsai.com" target="_blank" rel="noopener noreferrer"
                class="text-slate-400 hover:text-white transition-colors duration-300 text-sm">
                Generated by wellstsai.com
            </a>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let allPosts = []; // 用於儲存所有文章資料
            const postList = document.getElementById('post-list');
            const searchInput = document.getElementById('search-input');

            // 異步獲取文章資料
            const fetchPosts = async () => {
                try {
                    const response = await fetch('./posts.json');
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    const posts = await response.json();
                    allPosts = posts; // 儲存到全域變數
                    renderPosts(allPosts); // 初始渲染所有文章
                } catch (error) {
                    console.error("無法讀取 posts.json:", error);
                    postList.innerHTML = `<p class="text-center text-red-400 col-span-full">無法載入文章列表，請確認 'posts.json' 檔案是否存在且格式正確。</p>`;
                }
            };

            // 渲染文章列表到頁面
            const renderPosts = (posts) => {
                if (!posts || posts.length === 0) {
                    postList.innerHTML = `<p class="text-center text-slate-400 col-span-full">找不到符合條件的文章。</p>`;
                    return;
                }

                // 根據創建日期排序，最新的在最前面
                posts.sort((a, b) => {
                    const dateA = new Date(a.created);
                    const dateB = new Date(b.created);

                    // 主要排序：日期，由新到舊
                    if (dateB - dateA !== 0) {
                        return dateB - dateA;
                    }

                    // 次要排序：標題，按字母順序
                    return a.title.localeCompare(b.title);
                });

                postList.innerHTML = posts.map((post) => {
                    const formatDate = (dateString) => {
                        const options = { year: 'numeric', month: 'long', day: 'numeric' };
                        return new Date(dateString).toLocaleDateString('zh-TW', options);
                    };

                    // *** FIX: Added target="_blank" and rel="noopener noreferrer" to open links in a new tab ***
                    return `
                        <a href="${post.file}" target="_blank" rel="noopener noreferrer" class="block glass-card rounded-2xl p-6 md:p-8 no-underline text-white">
                            <article class="flex flex-col h-full">
                                <div class="flex items-center mb-5">
                                    <div class="w-12 h-12 rounded-full flex items-center justify-center mr-4 gradient-icon-bg">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-cyan-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                          <path stroke-linecap="round" stroke-linejoin="round" d="M9 20l-5.447-2.724A1 1 0 013 16.382V7.618a1 1 0 01.553-.894L9 4m0 16v-2m0-14v2m0 12h12m-12 0l5.447 2.724A1 1 0 0018 16.382V7.618a1 1 0 00-.553-.894L12 4m0 16V4m6 12h3a1 1 0 001-1V9a1 1 0 00-1-1h-3m0 8v-2m0-6v-2" />
                                        </svg>
                                    </div>
                                    <h2 class="text-xl font-bold gradient-text-purple">${post.title}</h2>
                                </div>
                                <p class="text-slate-400 flex-grow mb-6">${post.description}</p>
                                <div class="text-xs text-slate-500 mt-auto">
                                    <span>建立於: ${formatDate(post.created)}</span>
                                </div>
                            </article>
                        </a>
                    `;
                }).join('');
            };

            // 設定 Intersection Observer 來觸發進場動畫 (僅用於 header 和 search)
            const setupIntersectionObserver = () => {
                const targets = document.querySelectorAll('.fade-in-up');
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('visible');
                            observer.unobserve(entry.target);
                        }
                    });
                }, {
                    threshold: 0.1
                });

                targets.forEach(target => {
                    observer.observe(target);
                });
            };

            // 處理搜尋輸入
            const handleSearch = (e) => {
                const searchTerm = e.target.value.toLowerCase();
                const filteredPosts = allPosts.filter(post =>
                    post.title.toLowerCase().includes(searchTerm) ||
                    post.description.toLowerCase().includes(searchTerm)
                );
                renderPosts(filteredPosts);
            };

            // 初始載入
            fetchPosts();
            searchInput.addEventListener('input', handleSearch);

            // 讓 header 和 search bar 也有動畫效果
            setupIntersectionObserver();
        });
    </script>
</body>

</html>
